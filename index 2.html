<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getDatabase,
ref,
set,
get,
update
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "AIzaSyB59dKNkKonvUwnQ7zCt2P3aN4_r9QthaU",
authDomain: "elon-investment-fc9cb.firebaseapp.com",
databaseURL: "https://elon-investment-fc9cb-default-rtdb.firebaseio.com",
projectId: "elon-investment-fc9cb",
storageBucket: "elon-investment-fc9cb.firebasestorage.app",
messagingSenderId: "329385280614",
appId: "1:329385280614:web:74aa8ffb6c942aab43d9a7",
measurementId: "G-9NV96SNZFD"
};

/* INIT */
const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getDatabase(app);

/* REGISTER */
window.register = async function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

const userCredential =
await createUserWithEmailAndPassword(
auth,
email,
password
);

const user = userCredential.user;

/* CREATE USER DATA */
await set(ref(db, 'users/' + user.uid), {

balance: 0,
profit: 0,
bonus: 0

});

alert("Account Created");

}catch(error){

alert(error.message);

}

}

/* LOGIN */
window.login = async function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

alert("Login Success");

/* SHOW DASHBOARD */
document.getElementById("loginBox").style.display="none";

document.getElementById("dashboard").style.display="block";

}catch(error){

alert(error.message);

}

}

/* CHECK USER */
onAuthStateChanged(auth, async(user)=>{

if(user){

const snapshot = await get(
ref(db, 'users/' + user.uid)
);

if(snapshot.exists()){

const data = snapshot.val();

/* UPDATE DASHBOARD */
document.getElementById("balance").innerText =
"$" + data.balance;

document.getElementById("profit").innerText =
"$" + data.profit;

}

}

});

</script>
