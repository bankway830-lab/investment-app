<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Investment Platform</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f1a;
color:white;
}

.container{max-width:900px;margin:auto;padding:20px;}

.card{
background:#141b2d;
padding:15px;
margin:10px 0;
border-radius:10px;
}

input,select,button{
width:100%;
padding:10px;
margin:5px 0;
border-radius:5px;
border:none;
}

button{
background:#00ffcc;
color:black;
font-weight:bold;
cursor:pointer;
}

.hidden{display:none;}

h1,h2{color:#00ffcc;}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="card">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()">Register</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<h1>Dashboard</h1>

<div class="card">
<h2>Balance</h2>
<h1 id="balance">$0</h1>
</div>

<div class="card">
<h2>Profit</h2>
<h1 id="profit">$0</h1>
</div>

<!-- DEPOSIT -->
<div class="card">
<h2>Deposit</h2>
<input id="txid" placeholder="TXID">
<input id="depositAmount" placeholder="Amount">
<select id="depositMethod">
<option>Bitcoin</option>
<option>PayPal</option>
<option>Bank Transfer</option>
</select>
<button onclick="submitDeposit()">Submit Deposit</button>
</div>

<!-- WITHDRAW -->
<div class="card">
<h2>Withdraw</h2>
<input id="withdrawAmount" placeholder="Amount">
<select id="withdrawMethod">
<option>Bitcoin</option>
<option>PayPal</option>
</select>
<input id="withdrawAddress" placeholder="Wallet Address">
<button onclick="submitWithdraw()">Request Withdraw</button>
</div>

<!-- ADMIN -->
<button id="adminBtn" style="display:none;" onclick="openAdmin()">
Admin Panel
</button>

<div id="adminPanel" class="hidden card">
<h2>Admin Deposits</h2>
<div id="adminDeposits"></div>
</div>

</div>

</div>

<!-- FIREBASE COMPAT SDK (IMPORTANT FIX) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

/* FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
databaseURL: "YOUR_DB_URL",
projectId: "YOUR_PROJECT",
storageBucket: "YOUR_PROJECT.appspot.com",
appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

/* REGISTER */
function register(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

auth.createUserWithEmailAndPassword(email,password)
.then(user=>{

db.ref("users/"+user.user.uid).set({
balance:0,
profit:0,
role:"user"
});

alert("Registered");

});

}

/* LOGIN */
function login(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

auth.signInWithEmailAndPassword(email,password)
.then(()=>{

document.getElementById("loginBox").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");

});

}

/* USER STATE */
auth.onAuthStateChanged(async user=>{

if(user){

let snap = await db.ref("users/"+user.uid).get();

if(snap.exists()){

let data = snap.val();

document.getElementById("balance").innerText="$"+data.balance;
document.getElementById("profit").innerText="$"+data.profit;

if(data.role==="admin"){
document.getElementById("adminBtn").style.display="block";
}

loadDeposits(user.uid);

}

}

});

/* DEPOSIT */
function submitDeposit(){

let user = auth.currentUser;
if(!user) return;

db.ref("deposits/"+user.uid).push({
txid:document.getElementById("txid").value,
amount:document.getElementById("depositAmount").value,
method:document.getElementById("depositMethod").value,
status:"pending"
});

alert("Deposit sent");

}

/* WITHDRAW */
function submitWithdraw(){

let user = auth.currentUser;
if(!user) return;

db.ref("withdrawals/"+user.uid).push({
amount:document.getElementById("withdrawAmount").value,
method:document.getElementById("withdrawMethod").value,
address:document.getElementById("withdrawAddress").value,
status:"pending"
});

alert("Withdraw sent");

}

/* ADMIN PANEL */
function openAdmin(){
document.getElementById("adminPanel").classList.toggle("hidden");
loadAdmin();
}

/* LOAD ADMIN */
function loadAdmin(){

db.ref("deposits").once("value",snap=>{

let box=document.getElementById("adminDeposits");
box.innerHTML="";

snap.forEach(user=>{

user.forEach(dep=>{

let d=dep.val();

box.innerHTML+=`
<div class="card">
<p>Amount: ${d.amount}</p>
<p>Status: ${d.status}</p>
</div>
`;

});

});

});

}

/* LOAD USER DEPOSITS */
function loadDeposits(uid){

db.ref("deposits/"+uid).on("value",snap=>{
console.log(snap.val());
});

}

</script>

</body>
</html>
