<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elite Trading Platform</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f1a;
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#141b2d;
padding:15px;
margin:10px 0;
border-radius:10px;
}

input,select,button{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:5px;
}

button{
background:#00ffcc;
color:black;
font-weight:bold;
cursor:pointer;
}

.hidden{display:none;}

h1,h2{color:#00ffcc;}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="card">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()">Register</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<h1>Dashboard</h1>

<div class="card">
<h2>Balance</h2>
<h1 id="balance">$0</h1>
</div>

<div class="card">
<h2>Profit</h2>
<h1 id="profit">$0</h1>
</div>

<!-- DEPOSIT -->
<div class="card">
<h2>Deposit</h2>
<input id="txid" placeholder="TXID">
<input id="depositAmount" placeholder="Amount">
<select id="depositMethod">
<option>Bitcoin</option>
<option>PayPal</option>
<option>Bank Transfer</option>
</select>
<button onclick="submitDeposit()">Submit Deposit</button>
</div>

<!-- WITHDRAW -->
<div class="card">
<h2>Withdraw</h2>
<input id="withdrawAmount" placeholder="Amount">
<select id="withdrawMethod">
<option>Bitcoin</option>
<option>PayPal</option>
</select>
<input id="withdrawAddress" placeholder="Wallet Address">
<button onclick="submitWithdraw()">Request Withdraw</button>
</div>

<!-- ADMIN -->
<button id="adminButton" style="display:none;" onclick="openAdmin()">
Admin Panel
</button>

<div id="adminPanel" class="hidden card">
<h2>Admin Deposits</h2>
<div id="adminDeposits"></div>
</div>

</div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { getDatabase, ref, set, get, update, push, onValue }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
databaseURL: "YOUR_DB_URL",
projectId: "YOUR_PROJECT",
storageBucket: "YOUR_PROJECT.appspot.com",
messagingSenderId: "ID",
appId: "APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

/* REGISTER */
window.register = async function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const user = await createUserWithEmailAndPassword(auth,email,password);

await set(ref(db,"users/"+user.user.uid),{
balance:0,
profit:0,
role:"user"
});

alert("Registered");

}

/* LOGIN */
window.login = async function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

await signInWithEmailAndPassword(auth,email,password);

}

/* USER STATE */
onAuthStateChanged(auth, async(user)=>{

if(user){

const snap = await get(ref(db,"users/"+user.uid));

if(snap.exists()){

const data = snap.val();

document.getElementById("loginBox").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");

document.getElementById("balance").innerText="$"+data.balance;
document.getElementById("profit").innerText="$"+data.profit;

/* ADMIN CHECK */
if(data.role === "admin"){
document.getElementById("adminButton").style.display="block";
}

loadDeposits(user.uid);

}

}

});

/* DEPOSIT */
window.submitDeposit = async function(){

const user = auth.currentUser;
if(!user) return;

await push(ref(db,"deposits/"+user.uid),{
txid:document.getElementById("txid").value,
amount:document.getElementById("depositAmount").value,
method:document.getElementById("depositMethod").value,
status:"pending",
time:new Date().toLocaleString()
});

alert("Deposit Sent");

}

/* WITHDRAW */
window.submitWithdraw = async function(){

const user = auth.currentUser;
if(!user) return;

await push(ref(db,"withdrawals/"+user.uid),{
amount:document.getElementById("withdrawAmount").value,
method:document.getElementById("withdrawMethod").value,
address:document.getElementById("withdrawAddress").value,
status:"pending",
time:new Date().toLocaleString()
});

alert("Withdraw Sent");

}

/* ADMIN PANEL */
window.openAdmin = function(){
document.getElementById("adminPanel").classList.toggle("hidden");
loadAdmin();
}

/* LOAD ADMIN */
function loadAdmin(){

onValue(ref(db,"deposits"),(snap)=>{

const box=document.getElementById("adminDeposits");
box.innerHTML="";

snap.forEach(user=>{

user.forEach(dep=>{

const d=dep.val();

box.innerHTML+=`
<div class="card">
<p>Amount: ${d.amount}</p>
<p>Status: ${d.status}</p>
</div>
`;

});

});

});

}

/* LOAD USER DEPOSITS */
function loadDeposits(uid){

onValue(ref(db,"deposits/"+uid),(snap)=>{

console.log(snap.val());

});

}

</script>

</body>
</html>
